name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://clinicovia.com
          NEXT_PUBLIC_BRIDGE_URL: https://clinicovia.com

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clinicovia_test
          POSTGRES_USER: clinicovia
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Tests
        run: |
          if find tests -type f \( -name 'test_*.py' -o -name '*_test.py' \) | read; then
            pytest --cov=app tests/
          else
            python -m compileall -q app
          fi
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: clinicovia_test
          POSTGRES_USER: clinicovia
          POSTGRES_PASSWORD: test_password
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose -f docker-compose.deploy.yml config
        env:
          POSTGRES_PASSWORD: test_password
          WHATSAPP_BRIDGE_SECRET: test_bridge_secret
      - run: docker build -f backend/Dockerfile -t clinicovia-backend:test backend
      - run: docker build -f whatsapp-bridge/Dockerfile --target production -t clinicovia-whatsapp-bridge:test whatsapp-bridge
